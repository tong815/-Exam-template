<!DOCTYPE html>
<html lang="zh-CN" data-paper="letter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam JSON Studio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar no-print" role="toolbar" aria-label="Exam editor controls">
    <div class="toolbar__left">
      <div class="toolbar__brand">
      <span class="toolbar__title" data-i18n="app.title">Exam JSON Studio</span>
      <span class="toolbar__subtitle" data-i18n="app.subtitle">exam-data.json editor, preview &amp; print</span>
      </div>
      <div class="toolbar__project" id="project-status" aria-live="polite">
        <span class="toolbar__project-label" data-i18n="status.currentProject">Current Project:</span>
        <span id="project-status-name" class="toolbar__project-name">Unsaved draft</span>
      </div>
    </div>
    <div class="toolbar__actions">
      <label class="toolbar__select">
        <span data-i18n="toolbar.template">Template</span>
        <select id="exam-profile" data-i18n-aria="toolbar.template"></select>
      </label>
      <label class="toolbar__select">
        <span data-i18n="toolbar.paper">Paper</span>
        <select id="paper-size" data-i18n-aria="toolbar.paper">
          <option value="letter" selected>Letter</option>
          <option value="a4">A4</option>
        </select>
      </label>
      <label class="toolbar__select">
        <span data-i18n="toolbar.editorLanguage">Editor UI</span>
        <select id="editor-language" data-i18n-aria="toolbar.editorLanguage">
          <option value="en">English</option>
          <option value="zh" selected>中文</option>
        </select>
      </label>
      <button type="button" id="btn-open-project" class="btn btn--secondary" data-i18n="toolbar.openProject">Open Project</button>
      <button type="button" id="btn-save-project" class="btn btn--secondary" data-i18n="toolbar.saveProject">Save Project</button>
      <button type="button" id="btn-save-project-as" class="btn btn--secondary" data-i18n="toolbar.saveProjectAs">Save Project As</button>
      <button type="button" id="btn-save-draft" class="btn btn--secondary" data-i18n="toolbar.saveDraft">Save Draft</button>
      <button type="button" id="btn-reset" class="btn btn--secondary" data-i18n="toolbar.reset">Reset to Default</button>
      <button type="button" id="btn-print" class="btn btn--primary" data-i18n="toolbar.print">Print / Save as PDF</button>
      <button type="button" id="btn-answer-key" class="btn btn--secondary" aria-pressed="false" data-i18n="toolbar.answerKey">
        Toggle Answer Key Preview
      </button>
      <button type="button" id="btn-teacher-notes" class="btn btn--secondary" aria-pressed="false" data-i18n="toolbar.teacherNotes">
        Toggle Teacher Notes
      </button>
    </div>
  </header>

  <div class="app-layout">
    <aside id="editor-root" class="editor-panel no-print" aria-label="Exam structure editor"></aside>

    <div class="preview-pane">
      <div id="answer-key-banner" class="answer-key-banner no-print is-hidden" role="status" data-i18n="banner.answerKey">
        Answer Key Preview — placeholder answers shown below each question
      </div>
      <main id="exam-root" class="exam-document" aria-live="polite"></main>
    </div>
  </div>

  <div id="toast" class="toast no-print is-hidden" role="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="src/schema.js"></script>
  <script src="src/i18n.js"></script>
  <script src="src/templates.js"></script>
  <script src="src/profiles/g11-functions.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/math.js"></script>
  <script src="src/renderer.js"></script>
  <script src="src/editor.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
